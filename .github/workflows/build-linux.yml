name: Build Linux AppImage

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")-linux" >> $GITHUB_OUTPUT

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev build-essential \
            curl wget file libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run tauri build

      - name: Create Linux Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Chrysanthemum ${{ steps.version.outputs.tag }}
          body: |
            Linux AppImage build of Chrysanthemum v${{ steps.version.outputs.tag }}.

            ### Usage
            ```bash
            chmod +x Chrysanthemum_*.AppImage
            ./Chrysanthemum_*.AppImage
            ```

            Requires FUSE to run, or extract with `--appimage-extract`.
          files: src-tauri/target/release/bundle/appimage/*.AppImage
          draft: false
          prerelease: false
