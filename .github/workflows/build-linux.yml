name: Build Linux AppImage

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")-linux" >> $GITHUB_OUTPUT

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev build-essential \
            curl wget file libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: Chrysanthemum-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Create Linux Release
        run: |
          cat > release-notes.md << 'EOF'
          Linux AppImage build of Chrysanthemum ${{ steps.version.outputs.tag }}.

          ### Usage
          ```bash
          chmod +x Chrysanthemum_*.AppImage
          ./Chrysanthemum_*.AppImage
          ```

          Requires FUSE to run, or extract with `--appimage-extract`.
          EOF
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Chrysanthemum ${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md \
            src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GH_TOKEN: ${{ github.token }}
